<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configuración | Sistema de Asistencia SENA</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body data-active="configuracion">

  <div class="app-shell">
    <div id="sidebar-container"></div>

    <main class="main-content">
      <div class="topbar">
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-light border d-lg-none" id="btnToggleSidebar">
            <i class="bi bi-list"></i>
          </button>
          <div>
            <h1 class="h5 fw-bold mb-0">Configuración del sistema</h1>
            <p class="breadcrumb-sena mb-0">Dashboard / Configuración</p>
          </div>
        </div>
      </div>

      <div id="alertaGuardado" class="alert alert-success d-none">
        <i class="bi bi-check-circle me-1"></i> Cambios guardados correctamente.
      </div>

      <form id="formConfiguracion" class="row g-4">
        <div class="col-lg-6">
          <div class="card-soft p-3 p-md-4 h-100">
            <h2 class="h6 fw-bold mb-3">Información del instructor</h2>

            <div class="mb-3">
              <label class="form-label small fw-semibold">Nombre completo</label>
              <input type="text" class="form-control form-control-sena" id="inputNombre" required />
            </div>

            <div class="mb-3">
              <label class="form-label small fw-semibold">Correo institucional</label>
              <input type="email" class="form-control form-control-sena" id="inputCorreo" required />
            </div>

            <div class="mb-3">
              <label class="form-label small fw-semibold">Contraseña nueva</label>
              <input type="password" class="form-control form-control-sena" id="inputPasswordNueva" placeholder="Dejar en blanco para no cambiar" />
            </div>

            <div class="mb-0">
              <label class="form-label small fw-semibold">Confirmar contraseña</label>
              <input type="password" class="form-control form-control-sena" id="inputPasswordConfirmar" placeholder="Repite la contraseña nueva" />
            </div>
          </div>
        </div>

        <div class="col-lg-6">
          <div class="card-soft p-3 p-md-4 h-100">
            <h2 class="h6 fw-bold mb-3">Preferencias de sesión</h2>

            <div class="mb-3">
              <label class="form-label small fw-semibold">Ficha por defecto</label>
              <select class="form-select form-control-sena" id="selectFichaDefecto"></select>
            </div>

            <div class="mb-3">
              <label class="form-label small fw-semibold">Jornada por defecto</label>
              <select class="form-select form-control-sena" id="selectJornadaDefecto">
                <option value="Mañana">Mañana</option>
                <option value="Tarde">Tarde</option>
                <option value="Noche">Noche</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label small fw-semibold">Duración de sesión (minutos)</label>
              <input type="number" class="form-control form-control-sena" id="inputDuracion" min="15" step="15" />
            </div>

            <div class="form-check form-switch mt-4">
              <input class="form-check-input" type="checkbox" id="checkNotificaciones" style="width: 3em; height: 1.5em;" />
              <label class="form-check-label small fw-semibold ms-2" for="checkNotificaciones">Notificaciones por correo</label>
            </div>
          </div>
        </div>

        <div class="col-12">
          <button type="submit" class="btn btn-sena px-4">
            <i class="bi bi-save me-1"></i> Guardar cambios
          </button>
        </div>
      </form>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/configuracion.js"></script>
</body>
</html>
