<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Código QR | Sistema de Asistencia SENA</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body data-active="crear-sesion">

  <div class="app-shell">
    <div id="sidebar-container"></div>

    <main class="main-content">
      <div class="topbar">
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-light border d-lg-none" id="btnToggleSidebar">
            <i class="bi bi-list"></i>
          </button>
          <h1 class="h5 fw-bold mb-0">Generación de código QR</h1>
        </div>
      </div>

      <div class="row justify-content-center">
        <div class="col-lg-6">
          <div class="card-soft qr-card">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h2 class="h6 fw-bold mb-0">Sesión activa</h2>
              <span class="badge-en-curso" id="badgeEstadoSesion">En curso</span>
            </div>

            <p class="mb-1"><strong>Ficha:</strong> <span id="qrFicha">—</span></p>
            <p class="text-muted mb-2" id="qrPrograma" style="font-size:0.85rem;">—</p>

            <div class="d-flex justify-content-center gap-4 flex-wrap text-start mb-2" style="font-size:0.85rem;">
              <p class="mb-0"><strong>Fecha:</strong> <span id="qrFecha">—</span></p>
              <p class="mb-0"><strong>Jornada:</strong> <span id="qrJornada">—</span></p>
            </div>
            <div class="d-flex justify-content-center gap-4 flex-wrap text-start mb-3" style="font-size:0.85rem;">
              <p class="mb-0"><strong>Inicio:</strong> <span id="qrHoraInicio">—</span></p>
              <p class="mb-0"><strong>Fin:</strong> <span id="qrHoraFin">—</span></p>
            </div>

            <div class="qr-box">
              <div id="qrcodeCanvas"></div>
            </div>

            <p class="mb-3">
              Código de sesión:
              <span class="session-code text-sena" id="qrCodigoTexto">------</span>
            </p>

            <div class="alert alert-light border d-inline-flex align-items-center gap-2 py-2 px-3" style="font-size:0.85rem;">
              <i class="bi bi-people text-sena"></i>
              <span id="qrProgreso">0 de 0 aprendices han registrado asistencia</span>
            </div>

            <div class="d-flex gap-2 justify-content-center mt-3 flex-wrap">
              <button class="btn btn-outline-sena" id="btnActualizarQR">
                <i class="bi bi-arrow-clockwise me-1"></i> Actualizar QR
              </button>
              <button class="btn btn-danger" id="btnFinalizarSesion">
                <i class="bi bi-x-circle me-1"></i> Finalizar sesión
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/codigo-qr.js"></script>
</body>
</html>
