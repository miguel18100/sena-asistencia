<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nueva sesión | Sistema de Asistencia SENA</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body data-active="crear-sesion">

  <div class="app-shell">
    <div id="sidebar-container"></div>

    <main class="main-content">
      <div class="topbar">
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-light border d-lg-none" id="btnToggleSidebar">
            <i class="bi bi-list"></i>
          </button>
          <div>
            <h1 class="h5 fw-bold mb-0">
              <i class="bi bi-arrow-left me-1"></i> Nueva sesión de asistencia
            </h1>
            <p class="breadcrumb-sena mb-0">Dashboard / Nueva sesión</p>
          </div>
        </div>
      </div>

      <div class="card-soft p-3 p-md-4 mb-4">
        <form id="formCrearSesion">
          <div class="mb-3">
            <label class="form-label small fw-semibold">Seleccione la ficha de formación</label>
            <select class="form-select form-control-sena" id="selectFicha" required></select>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label small fw-semibold">Fecha de la sesión</label>
              <input type="date" class="form-control form-control-sena" id="inputFecha" required />
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-semibold">Jornada</label>
              <select class="form-select form-control-sena" id="selectJornada" required>
                <option value="Mañana">Mañana</option>
                <option value="Tarde">Tarde</option>
                <option value="Noche">Noche</option>
              </select>
            </div>
          </div>

          <!-- Resumen de la ficha seleccionada -->
          <div class="border rounded-3 p-3 mb-3" style="background:#F8FAF7;">
            <h2 class="h6 fw-bold mb-3">Resumen de la ficha</h2>
            <div class="d-flex align-items-start gap-3 flex-wrap">
              <div class="d-flex align-items-center gap-2">
                <div class="kpi-icon green"><i class="bi bi-people-fill"></i></div>
                <div>
                  <div class="kpi-value" style="font-size:1.2rem;" id="resumenTotalAprendices">0</div>
                  <div class="kpi-label">Aprendices matriculados</div>
                </div>
              </div>
              <div class="ms-md-4">
                <p class="mb-1" style="font-size:0.85rem;"><strong>Programa:</strong> <span id="resumenPrograma">—</span></p>
                <p class="mb-0" style="font-size:0.85rem;"><strong>Instructor:</strong> <span id="resumenInstructor">—</span></p>
              </div>
            </div>
          </div>

          <div id="alertaCrearSesion" class="alert alert-danger d-none"></div>

          <button type="submit" class="btn btn-sena">
            <i class="bi bi-plus-circle me-1"></i> Generar sesión
          </button>
        </form>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/crear-sesion.js"></script>
</body>
</html>
