<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Sistema de Asistencia SENA</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body data-active="dashboard">

  <div class="app-shell">
    <div id="sidebar-container"></div>

    <main class="main-content">
      <!-- Topbar -->
      <div class="topbar">
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-light border d-lg-none" id="btnToggleSidebar">
            <i class="bi bi-list"></i>
          </button>
          <div>
            <h1 class="h5 fw-bold mb-0">Bienvenido, <span id="nombreInstructor">Instructor</span></h1>
            <p class="text-muted mb-0" style="font-size: 0.85rem;">
              Ficha activa: <span id="fichaActivaLabel">—</span>
            </p>
          </div>
        </div>
        <div class="d-flex align-items-center gap-3">
          <i class="bi bi-bell fs-5 text-muted"></i>
          <div class="rounded-circle bg-light border d-flex align-items-center justify-content-center" style="width:38px;height:38px;">
            <i class="bi bi-person text-muted"></i>
          </div>
        </div>
      </div>

      <!-- KPIs -->
      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <div class="kpi-card">
            <div class="kpi-icon green"><i class="bi bi-people-fill"></i></div>
            <div>
              <div class="kpi-value" id="kpiAprendices">0</div>
              <div class="kpi-label">Aprendices matriculados</div>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="kpi-card">
            <div class="kpi-icon orange"><i class="bi bi-calendar-event-fill"></i></div>
            <div>
              <div class="kpi-value" id="kpiSesionesHoy">0</div>
              <div class="kpi-label">Sesiones hoy</div>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="kpi-card">
            <div class="kpi-icon blue"><i class="bi bi-graph-up"></i></div>
            <div>
              <div class="kpi-value"><span id="kpiPromedio">0</span>%</div>
              <div class="kpi-label">Asistencia promedio</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Últimas sesiones -->
      <div class="card-soft p-3 p-md-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 class="h6 fw-bold mb-0">Últimas sesiones</h2>
        </div>

        <div class="table-responsive">
          <table class="table table-sena align-middle mb-0">
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Ficha</th>
                <th>Jornada</th>
                <th>Asistencia</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody id="tablaUltimasSesiones">
              <!-- Se llena por JS -->
            </tbody>
          </table>
        </div>

        <div id="estadoVacioSesiones" class="empty-state d-none">
          <i class="bi bi-calendar-x"></i>
          <p class="mb-0">Aún no hay sesiones registradas.</p>
        </div>
      </div>

      <div class="mt-4">
        <a href="crear-sesion.html" class="btn btn-sena">
          <i class="bi bi-plus-circle me-1"></i> Crear nueva sesión
        </a>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
