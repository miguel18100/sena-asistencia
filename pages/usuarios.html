<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de usuarios | Sistema de Asistencia SENA</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body data-active="usuarios">

  <div class="app-shell">
    <div id="sidebar-container"></div>

    <main class="main-content">
      <div class="topbar">
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-light border d-lg-none" id="btnToggleSidebar">
            <i class="bi bi-list"></i>
          </button>
          <h1 class="h5 fw-bold mb-0">Gestión de usuarios</h1>
        </div>
        <button class="btn btn-sena" data-bs-toggle="modal" data-bs-target="#modalUsuario" id="btnNuevoUsuario">
          <i class="bi bi-plus-circle me-1"></i> Nuevo usuario
        </button>
      </div>

      <div class="card-soft p-3 p-md-4">
        <div class="table-responsive">
          <table class="table table-sena align-middle mb-0">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Rol</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaUsuarios"></tbody>
          </table>
        </div>

        <div id="estadoVacioUsuarios" class="empty-state d-none">
          <i class="bi bi-people"></i>
          <p class="mb-0">Aún no hay usuarios registrados.</p>
        </div>

        <nav class="mt-3">
          <ul class="pagination pagination-sm justify-content-center mb-0" id="paginacionUsuarios"></ul>
        </nav>
      </div>
    </main>
  </div>

  <!-- Modal crear/editar usuario -->
  <div class="modal fade" id="modalUsuario" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="tituloModalUsuario">Nuevo usuario</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="formUsuario">
          <div class="modal-body">
            <input type="hidden" id="inputUsuarioId" />
            <div class="mb-3">
              <label class="form-label small fw-semibold">Nombre completo</label>
              <input type="text" class="form-control form-control-sena" id="inputUsuarioNombre" required />
            </div>
            <div class="mb-3">
              <label class="form-label small fw-semibold">Correo institucional</label>
              <input type="email" class="form-control form-control-sena" id="inputUsuarioCorreo" required />
            </div>
            <div class="mb-3">
              <label class="form-label small fw-semibold">Rol</label>
              <select class="form-select form-control-sena" id="selectUsuarioRol">
                <option value="Instructor">Instructor</option>
                <option value="Administrador">Administrador</option>
              </select>
            </div>
            <div class="mb-0">
              <label class="form-label small fw-semibold">Estado</label>
              <select class="form-select form-control-sena" id="selectUsuarioEstado">
                <option value="Activo">Activo</option>
                <option value="Inactivo">Inactivo</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-sena">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/usuarios.js"></script>
</body>
</html>
