<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reportes | Sistema de Asistencia SENA</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body data-active="reportes">

  <div class="app-shell">
    <div id="sidebar-container"></div>

    <main class="main-content">
      <div class="topbar">
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-light border d-lg-none" id="btnToggleSidebar">
            <i class="bi bi-list"></i>
          </button>
          <div>
            <h1 class="h5 fw-bold mb-0">Reportes de asistencia</h1>
            <p class="breadcrumb-sena mb-0">Dashboard / Reportes</p>
          </div>
        </div>
      </div>

      <div class="card-soft p-3 p-md-4 mb-4">
        <form id="formFiltrosReporte" class="row g-3 align-items-end">
          <div class="col-md-4">
            <label class="form-label small fw-semibold">Ficha</label>
            <select class="form-select form-control-sena" id="selectFichaReporte"></select>
          </div>
          <div class="col-md-3">
            <label class="form-label small fw-semibold">Desde</label>
            <input type="date" class="form-control form-control-sena" id="inputDesde" required />
          </div>
          <div class="col-md-3">
            <label class="form-label small fw-semibold">Hasta</label>
            <input type="date" class="form-control form-control-sena" id="inputHasta" required />
          </div>
          <div class="col-md-2">
            <button type="submit" class="btn btn-sena w-100">Consultar</button>
          </div>
        </form>
      </div>

      <!-- KPIs del reporte -->
      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <div class="kpi-card">
            <div class="kpi-icon green"><i class="bi bi-check-circle-fill"></i></div>
            <div>
              <div class="kpi-value" id="kpiAsistenciasTotales">0</div>
              <div class="kpi-label">Asistencias totales</div>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="kpi-card">
            <div class="kpi-icon" style="background: rgba(230,57,70,0.12); color:#E63946;"><i class="bi bi-x-circle-fill"></i></div>
            <div>
              <div class="kpi-value" id="kpiInasistenciasTotales">0</div>
              <div class="kpi-label">Inasistencias totales</div>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="kpi-card">
            <div class="kpi-icon blue"><i class="bi bi-bar-chart-fill"></i></div>
            <div>
              <div class="kpi-value"><span id="kpiPorcentajeGeneral">0</span>%</div>
              <div class="kpi-label">Porcentaje de asistencia</div>
            </div>
          </div>
        </div>
      </div>

      <div class="card-soft p-3 p-md-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 class="h6 fw-bold mb-0">Detalle por aprendiz</h2>
          <button class="btn btn-sm btn-sena" id="btnExportar" disabled title="Función disponible próximamente">
            <i class="bi bi-download me-1"></i> Exportar (Futuro)
          </button>
        </div>

        <div class="table-responsive">
          <table class="table table-sena align-middle mb-0">
            <thead>
              <tr>
                <th>Aprendiz</th>
                <th>Asistencias</th>
                <th>Inasistencias</th>
                <th>Porcentaje</th>
              </tr>
            </thead>
            <tbody id="tablaReporte"></tbody>
          </table>
        </div>

        <div id="estadoVacioReporte" class="empty-state d-none">
          <i class="bi bi-bar-chart"></i>
          <p class="mb-0">No hay datos para el rango de fechas seleccionado.</p>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/reportes.js"></script>
</body>
</html>
