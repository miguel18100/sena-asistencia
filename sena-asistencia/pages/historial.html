<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historial | Sistema de Asistencia SENA</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body data-active="historial">

  <div class="app-shell">
    <div id="sidebar-container"></div>

    <main class="main-content">
      <div class="topbar">
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-light border d-lg-none" id="btnToggleSidebar">
            <i class="bi bi-list"></i>
          </button>
          <div>
            <h1 class="h5 fw-bold mb-0">Historial de asistencias</h1>
            <p class="breadcrumb-sena mb-0">Dashboard / Historial</p>
          </div>
        </div>
      </div>

      <div class="card-soft p-3 p-md-4">
        <div class="d-flex flex-wrap gap-2 mb-3">
          <div class="flex-grow-1" style="min-width:220px;">
            <div class="input-group">
              <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
              <input type="text" class="form-control form-control-sena" id="inputBuscar" placeholder="Buscar por nombre o documento..." />
            </div>
          </div>
          <select class="form-select form-control-sena" id="selectFiltroFicha" style="max-width:220px;">
            <option value="">Todas las fichas</option>
          </select>
        </div>

        <div class="table-responsive">
          <table class="table table-sena align-middle mb-0">
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Ficha</th>
                <th>Jornada</th>
                <th>Asistencia</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaHistorial"></tbody>
          </table>
        </div>

        <div id="estadoVacioHistorial" class="empty-state d-none">
          <i class="bi bi-clock-history"></i>
          <p class="mb-0">No se encontraron registros con los filtros aplicados.</p>
        </div>

        <nav class="mt-3">
          <ul class="pagination pagination-sm justify-content-center mb-0" id="paginacionHistorial"></ul>
        </nav>
      </div>
    </main>
  </div>

  <!-- Modal de detalle de sesión (aprendiz por aprendiz) -->
  <div class="modal fade" id="modalDetalleSesion" tabindex="-1">
    <div class="modal-dialog modal-dialog-scrollable modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Detalle de la sesión</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="detalleSesionInfo" class="mb-3"></div>
          <div class="table-responsive">
            <table class="table table-sena align-middle mb-0">
              <thead>
                <tr>
                  <th>Aprendiz</th>
                  <th>Documento</th>
                  <th>Hora</th>
                  <th>Estado</th>
                </tr>
              </thead>
              <tbody id="tablaDetalleAprendices"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/historial.js"></script>
</body>
</html>
