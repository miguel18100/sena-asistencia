<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escanear código QR | Asistencia SENA</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body style="background:#111;">

  <div class="mobile-shell">
    <div class="mobile-topbar">
      <a href="dashboard.html" class="text-white"><i class="bi bi-arrow-left fs-5"></i></a>
      <strong>Escanear código QR</strong>
    </div>

    <div class="mobile-body text-center">
      <p class="text-muted mb-2" style="font-size:0.85rem;">
        Apunte la cámara al código QR<br />para registrar su asistencia
      </p>

      <div class="scan-frame">
        <div id="qr-reader"></div>
      </div>

      <div id="estadoEscaneo" class="text-muted d-flex align-items-center justify-content-center gap-2 mb-3" style="font-size:0.85rem;">
        <span class="spinner-grow spinner-grow-sm text-sena" role="status"></span>
        Buscando código...
      </div>

      <div id="alertaEscaneo" class="alert alert-danger d-none text-start"></div>

      <hr class="my-4" />

      <p class="text-muted mb-2" style="font-size:0.85rem;">
        ¿No puedes escanear? Ingresa el código manualmente
      </p>
      <form id="formCodigoManual" class="d-flex gap-2 justify-content-center flex-wrap">
        <input
          type="text"
          class="form-control form-control-sena text-center text-uppercase"
          id="inputCodigoManual"
          placeholder="Ej: 8F7A2B"
          maxlength="6"
          style="max-width: 180px;"
        />
        <button class="btn btn-outline-sena" type="submit">Validar</button>
      </form>
    </div>
  </div>

  <!-- Modal: solicitar documento del aprendiz antes de confirmar -->
  <div class="modal fade" id="modalDocumento" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Confirma tu identidad</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="formConfirmarIdentidad">
          <div class="modal-body">
            <p class="text-muted" style="font-size:0.85rem;">
              Código de sesión detectado: <strong id="codigoDetectadoTexto">—</strong>
            </p>
            <label class="form-label small fw-semibold">Número de documento</label>
            <input type="text" class="form-control form-control-sena" id="inputDocumentoAprendiz" placeholder="Ej: 1075263789" required />
            <div id="alertaModalDocumento" class="alert alert-danger mt-3 d-none py-2"></div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-sena">Registrar asistencia</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/escanear-qr.js"></script>
</body>
</html>
