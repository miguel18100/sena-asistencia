<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión | Sistema Inteligente de Registro de Asistencia - SENA</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <!-- Estilos propios -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div class="login-page">
    <div class="login-card">
      <img
        src="/assets/logosena.png"
        alt="Logo SENA"
        class="login-logo"
      />
      <h1 class="h4 text-center fw-bold mb-1">Sistema Inteligente de<br />Registro de Asistencia</h1>
      <p class="text-center text-muted mb-4" style="font-size: 0.9rem;">Inicia sesión para continuar</p>

      <div id="alertaLogin" class="alert alert-danger d-none" role="alert"></div>

      <form id="formLogin" novalidate>
        <div class="mb-3">
          <label for="documento" class="form-label small fw-semibold">Número de documento o correo</label>
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="bi bi-person text-sena"></i></span>
            <input
              type="text"
              class="form-control form-control-sena"
              id="documento"
              placeholder="Ej: 1075263789"
              required
            />
          </div>
        </div>

        <div class="mb-2">
          <label for="password" class="form-label small fw-semibold">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="bi bi-lock text-sena"></i></span>
            <input
              type="password"
              class="form-control form-control-sena"
              id="password"
              placeholder="••••••••"
              required
            />
            <span class="input-group-text bg-white" role="button" id="togglePassword">
              <i class="bi bi-eye" id="iconoOjo"></i>
            </span>
          </div>
        </div>

        <div class="text-end mb-4">
          <a href="#" class="small text-sena text-decoration-none">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn btn-sena w-100 py-2">INGRESAR</button>
      </form>

      <p class="text-center text-muted mt-4 mb-0" style="font-size: 0.75rem;">
        © 2026 SENA - Todos los derechos reservados
      </p>

      <div class="alert alert-light border mt-3 mb-0 py-2 px-3" style="font-size: 0.75rem;">
        <strong>Demo:</strong> documento <code>1075263789</code> · contraseña <code>sena2026</code>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/db.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
